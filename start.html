<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>锚点 · 开始</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
    <style>
      body.page-start {
        min-height: 100vh;
        padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 3vw, 1.5rem) 3rem;
      }

      .shell {
        position: relative;
        z-index: 1;
        max-width: 1080px;
        margin: 0 auto;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: clamp(2rem, 5vw, 3rem);
        animation: rise-in 0.65s ease-out both;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .brand-icon {
        width: 38px;
        height: 38px;
        color: var(--accent);
        filter: drop-shadow(0 3px 10px var(--green-glow));
      }

      .brand-name {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 1.35rem;
        letter-spacing: 0.06em;
      }

      .brand-tag {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .top-pill {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--accent);
        background: var(--green-soft);
        border: 1px solid var(--line);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
      }

      /* —— 推销式 Hero —— */
      .hero {
        text-align: center;
        margin-bottom: clamp(2rem, 5vw, 3rem);
        animation: rise-in 0.7s ease-out 0.06s both;
      }

      .hero__eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin: 0 0 1rem;
        padding: 0.35rem 0.85rem;
        font-size: 0.74rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
        background: linear-gradient(90deg, var(--sakura-light), #fff);
        border: 1px solid var(--sakura-line);
        border-radius: 999px;
      }

      .hero__eyebrow::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--sakura);
        box-shadow: 0 0 0 3px var(--sakura-soft);
      }

      .hero__title {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: clamp(1.75rem, 5.5vw, 2.85rem);
        line-height: 1.18;
        letter-spacing: 0.02em;
        margin: 0 0 0.85rem;
        color: var(--ink);
      }

      .hero__title em {
        font-style: normal;
        color: var(--accent);
        position: relative;
      }

      .hero__title em::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0.08em;
        height: 0.28em;
        background: var(--sakura-soft);
        z-index: -1;
        border-radius: 2px;
      }

      .hero__sub {
        max-width: 34em;
        margin: 0 auto 1.75rem;
        font-size: clamp(0.92rem, 2.2vw, 1.05rem);
        line-height: 1.65;
        color: var(--muted);
      }

      .pain-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.85rem;
        text-align: left;
      }

      @media (max-width: 780px) {
        .pain-row {
          grid-template-columns: 1fr;
        }
      }

      .pain-card {
        position: relative;
        padding: 1.1rem 1rem 1rem;
        border-radius: calc(var(--radius) + 2px);
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: var(--shadow);
        transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
        cursor: default;
      }

      .pain-card[data-for="A"].is-linked,
      .mode-col[data-mode="A"]:hover ~ .pain-bridge,
      .pain-card[data-for="A"]:hover {
        border-color: rgba(1, 68, 33, 0.28);
      }

      .pain-card__num {
        display: block;
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 2rem;
        line-height: 1;
        color: var(--sakura-soft);
        margin-bottom: 0.45rem;
        transition: color 0.25s;
      }

      .pain-card__q {
        margin: 0;
        font-size: 0.88rem;
        font-weight: 600;
        line-height: 1.55;
        color: var(--ink-soft);
      }

      .pain-card.is-linked {
        border-color: var(--accent);
        box-shadow: var(--shadow-lg);
        transform: translateY(-3px);
      }

      .pain-card.is-linked .pain-card__num {
        color: var(--accent);
      }

      .pain-card.is-linked .pain-card__q {
        color: var(--ink);
      }

      /* —— 三竖栏模式 —— */
      .modes-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        animation: rise-in 0.65s ease-out 0.14s both;
      }

      .modes-head h2 {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(1.05rem, 2.5vw, 1.25rem);
        margin: 0;
        color: var(--ink);
      }

      .modes-head p {
        margin: 0;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .mode-columns {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.85rem;
        align-items: stretch;
        margin-bottom: 2rem;
        animation: rise-in 0.7s ease-out 0.2s both;
      }

      @media (max-width: 820px) {
        .mode-columns {
          grid-template-columns: 1fr;
        }
      }

      .mode-col {
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 4px);
        background: rgba(255, 255, 255, 0.72);
        text-align: left;
        cursor: pointer;
        overflow: hidden;
        transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s, background 0.3s;
        font: inherit;
        color: inherit;
      }

      .mode-col::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: transparent;
        transition: background 0.3s;
      }

      .mode-col:hover,
      .mode-col.is-active {
        border-color: rgba(1, 68, 33, 0.35);
        box-shadow: var(--shadow-lg);
        transform: translateY(-4px);
        background: #fff;
      }

      .mode-col.is-active {
        border-color: var(--accent);
        background: linear-gradient(180deg, #fff 0%, rgba(1, 68, 33, 0.04) 100%);
      }

      .mode-col.is-active::before {
        background: linear-gradient(90deg, var(--accent), var(--sakura));
      }

      .mode-col.is-dim {
        opacity: 0.62;
        transform: none;
        box-shadow: none;
      }

      .mode-col.is-dim:hover {
        opacity: 0.85;
      }

      .mode-col__head {
        padding: 1.25rem 1.15rem 0.85rem;
      }

      .mode-col__badge-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }

      .mode-col__badge {
        width: 2.15rem;
        height: 2.15rem;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--accent);
        background: var(--sakura-light);
        border: 1px solid var(--sakura-line);
        transition: background 0.3s, color 0.3s;
      }

      .mode-col.is-active .mode-col__badge {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }

      .mode-col__tag {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--muted);
        background: var(--green-soft);
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        transition: color 0.3s, background 0.3s;
      }

      .mode-col.is-active .mode-col__tag {
        color: var(--accent);
        background: rgba(1, 68, 33, 0.1);
      }

      .mode-col__title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.08rem;
        margin: 0 0 0.45rem;
        color: var(--ink);
      }

      .mode-col__teaser {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.55;
        color: var(--muted);
        transition: color 0.3s;
      }

      .mode-col.is-active .mode-col__teaser {
        color: var(--ink-soft);
      }

      .mode-col__detail {
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-height 0.45s ease, opacity 0.35s ease, padding 0.35s ease;
        padding: 0 1.15rem;
      }

      .mode-col.is-active .mode-col__detail,
      .mode-col:hover .mode-col__detail {
        max-height: 280px;
        opacity: 1;
        padding: 0 1.15rem 1.15rem;
      }

      .mode-col__detail-inner {
        padding-top: 0.85rem;
        border-top: 1px dashed var(--line);
      }

      .mode-col__solve {
        margin: 0 0 0.65rem;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--accent);
      }

      .mode-col__bullets {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .mode-col__bullets li {
        position: relative;
        padding-left: 1rem;
        font-size: 0.78rem;
        line-height: 1.55;
        color: var(--ink-soft);
      }

      .mode-col__bullets li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.55em;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--sakura-deep);
      }

      .mode-col__status {
        margin-top: auto;
        padding: 0.65rem 1.15rem;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--muted);
        background: rgba(1, 68, 33, 0.04);
        border-top: 1px solid var(--line);
      }

      .mode-col.is-active .mode-col__status {
        color: var(--accent);
        background: rgba(1, 68, 33, 0.08);
      }

      .mode-col[data-available="false"] .mode-col__status {
        color: var(--sakura-deep);
      }

      /* —— CTA —— */
      .cta-zone {
        text-align: center;
        animation: rise-in 0.65s ease-out 0.32s both;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-width: 12rem;
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 1rem;
        letter-spacing: 0.06em;
        text-decoration: none;
        border: none;
        border-radius: 999px;
        padding: 0.85rem 2.25rem;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
        color: #fff;
        box-shadow: 0 8px 28px rgba(1, 68, 33, 0.28);
        transition: filter 0.15s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
        cursor: pointer;
      }

      .cta:hover:not(:disabled) {
        filter: brightness(1.06);
        box-shadow: 0 12px 32px rgba(1, 68, 33, 0.34);
        transform: translateY(-2px);
      }

      .cta:active:not(:disabled) {
        transform: scale(0.98);
      }

      .cta:disabled {
        opacity: 0.42;
        cursor: not-allowed;
        box-shadow: none;
      }

      .cta-note {
        margin: 0.85rem 0 0;
        font-size: 0.78rem;
        color: var(--muted);
        min-height: 1.4em;
      }

      .cta-note strong {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body class="page-start">
    <div class="shell">
      <header class="top-bar">
        <div class="brand">
          <svg
            class="brand-icon"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M16 3L5 9.5V17c0 6.5 4.5 12 11 13.5 6.5-1.5 11-7 11-13.5V9.5L16 3z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
            />
            <circle cx="16" cy="15" r="3.2" fill="currentColor" />
            <path
              d="M16 18.5v6"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
          <div>
            <div class="brand-name">锚点</div>
            <div class="brand-tag">行程规划</div>
          </div>
        </div>
        <span class="top-pill">三种模式 · 对号入座</span>
      </header>

      <section class="hero" aria-labelledby="hero-title">
        <p class="hero__eyebrow">Stop the tab chaos</p>
        <h1 class="hero__title" id="hero-title">
          你是否还在<em>盲做攻略</em>？
        </h1>
        <p class="hero__sub">
          收藏夹里躺着二十篇笔记，地图打了三十个 pin，最后发现——<br />
          玩、住、吃根本不在一条线上。先认清你的困境，再选模式。
        </p>

        <div class="pain-row" id="pain-row">
          <article class="pain-card" data-for="A">
            <span class="pain-card__num">01</span>
            <p class="pain-card__q">
              去哪儿定了，却不知道怎么玩<strong>最顺路</strong>、还<strong>省钱</strong>？
            </p>
          </article>
          <article class="pain-card" data-for="B">
            <span class="pain-card__num">02</span>
            <p class="pain-card__q">
              只有<strong>三天假</strong>，预算也圈好了，就是不知道去哪<strong>性价比最高</strong>？
            </p>
          </article>
          <article class="pain-card" data-for="C">
            <span class="pain-card__num">03</span>
            <p class="pain-card__q">
              酒店订好了，以它为中心，<strong>周边还有什么</strong>值得深度逛？
            </p>
          </article>
        </div>
      </section>

      <div class="modes-head">
        <h2>选一种规划模式</h2>
        <p>悬停或点击竖栏，查看完整介绍</p>
      </div>

      <div class="mode-columns" id="mode-columns" role="list">
        <button
          type="button"
          class="mode-col"
          data-mode="A"
          data-available="true"
          role="listitem"
          aria-pressed="false"
        >
          <div class="mode-col__head">
            <div class="mode-col__badge-row">
              <span class="mode-col__badge" aria-hidden="true">A</span>
              <span class="mode-col__tag">目的地驱动</span>
            </div>
            <h3 class="mode-col__title">锚点·导向</h3>
            <p class="mode-col__teaser">已知去哪，解决「怎么玩最顺路 / 省钱」。</p>
          </div>
          <div class="mode-col__detail">
            <div class="mode-col__detail-inner">
              <p class="mode-col__solve">✦ 解决什么</p>
              <ul class="mode-col__bullets">
                <li>玩 → 住 → 吃，优先级两轮点选 + 拖拽微调</li>
                <li>第一个锚点落定后，自动约束后续选项的地理范围</li>
                <li>路线不再南辕北辙，顺路又省预算</li>
              </ul>
            </div>
          </div>
          <span class="mode-col__status">✓ 现已开放</span>
        </button>

        <button
          type="button"
          class="mode-col"
          data-mode="B"
          data-available="false"
          role="listitem"
          aria-pressed="false"
        >
          <div class="mode-col__head">
            <div class="mode-col__badge-row">
              <span class="mode-col__badge" aria-hidden="true">B</span>
              <span class="mode-col__tag">预算 / 时间驱动</span>
            </div>
            <h3 class="mode-col__title">锚点·随心</h3>
            <p class="mode-col__teaser">只有 N 天假，反向搜索「去哪性价比最高」。</p>
          </div>
          <div class="mode-col__detail">
            <div class="mode-col__detail-inner">
              <p class="mode-col__solve">✦ 解决什么</p>
              <ul class="mode-col__bullets">
                <li>从出发地出发，输入每日预算与时间窗口</li>
                <li>匹配机票 / 高铁时效内的候选城市</li>
                <li>让目的地来找你，而不是盲开盲盒</li>
              </ul>
            </div>
          </div>
          <span class="mode-col__status">即将上线</span>
        </button>

        <button
          type="button"
          class="mode-col"
          data-mode="C"
          data-available="false"
          role="listitem"
          aria-pressed="false"
        >
          <div class="mode-col__head">
            <div class="mode-col__badge-row">
              <span class="mode-col__badge" aria-hidden="true">C</span>
              <span class="mode-col__tag">定点辐射</span>
            </div>
            <h3 class="mode-col__title">锚点·巡航</h3>
            <p class="mode-col__teaser">以酒店或必去景点为圆心，画圈式深度游。</p>
          </div>
          <div class="mode-col__detail">
            <div class="mode-col__detail-inner">
              <p class="mode-col__solve">✦ 解决什么</p>
              <ul class="mode-col__bullets">
                <li>等时圈算法：自驾 / 高铁，每日出行方式可选</li>
                <li>定点 + 天数，计算不同方式下的可达范围</li>
                <li>周边深度探索，不瞎跑、不踩空</li>
              </ul>
            </div>
          </div>
          <span class="mode-col__status">即将上线</span>
        </button>
      </div>

      <div class="cta-zone">
        <button type="button" class="cta" id="btn-start" disabled>开始旅程</button>
        <p class="cta-note" id="cta-note">请先选择一种规划模式</p>
      </div>
    </div>

    <script>
      (function () {
        var cols = document.querySelectorAll(".mode-col");
        var painCards = document.querySelectorAll(".pain-card");
        var btnStart = document.getElementById("btn-start");
        var ctaNote = document.getElementById("cta-note");
        var selected = null;

        var modeLabels = {
          A: "锚点·导向",
          B: "锚点·随心",
          C: "锚点·巡航",
        };

        function setActive(mode) {
          selected = mode;
          cols.forEach(function (col) {
            var isActive = col.dataset.mode === mode;
            col.classList.toggle("is-active", isActive);
            col.classList.toggle("is-dim", mode && !isActive);
            col.setAttribute("aria-pressed", isActive ? "true" : "false");
          });
          painCards.forEach(function (card) {
            card.classList.toggle("is-linked", card.dataset.for === mode);
          });

          var col = document.querySelector('.mode-col[data-mode="' + mode + '"]');
          var available = col && col.dataset.available === "true";

          btnStart.disabled = !available;
          if (!mode) {
            ctaNote.textContent = "请先选择一种规划模式";
          } else if (available) {
            ctaNote.innerHTML =
              "已选 <strong>" + modeLabels[mode] + "</strong>，点击开始填写行程";
          } else {
            ctaNote.textContent = modeLabels[mode] + " 尚未开放，可先体验模式 A";
          }
        }

        cols.forEach(function (col) {
          col.addEventListener("click", function () {
            var mode = col.dataset.mode;
            setActive(selected === mode ? null : mode);
          });
          col.addEventListener("mouseenter", function () {
            painCards.forEach(function (card) {
              card.classList.toggle("is-linked", card.dataset.for === col.dataset.mode);
            });
          });
          col.addEventListener("mouseleave", function () {
            if (!selected) {
              painCards.forEach(function (card) {
                card.classList.remove("is-linked");
              });
            } else {
              setActive(selected);
            }
          });
        });

        painCards.forEach(function (card) {
          card.addEventListener("mouseenter", function () {
            var mode = card.dataset.for;
            document.querySelector('.mode-col[data-mode="' + mode + '"]').classList.add("is-active");
            if (!selected) {
              cols.forEach(function (col) {
                col.classList.toggle("is-dim", col.dataset.mode !== mode);
              });
            }
            card.classList.add("is-linked");
          });
          card.addEventListener("mouseleave", function () {
            if (!selected) {
              cols.forEach(function (col) {
                col.classList.remove("is-active", "is-dim");
              });
              painCards.forEach(function (c) {
                c.classList.remove("is-linked");
              });
            } else {
              setActive(selected);
            }
          });
          card.addEventListener("click", function () {
            setActive(card.dataset.for);
          });
        });

        btnStart.addEventListener("click", function () {
          if (!selected) return;
          var col = document.querySelector('.mode-col[data-mode="' + selected + '"]');
          if (!col || col.dataset.available !== "true") return;
          try {
            sessionStorage.setItem("anchorMode", selected);
          } catch (e) {}
          window.location.href = "index.html?mode=" + selected;
        });

        setActive("A");
      })();
    </script>
  </body>
</html>

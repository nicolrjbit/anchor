<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>锚点 · 优先级</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="flow-layout.css" />
    <style>
      @keyframes pop-badge {
        0% {
          transform: scale(0);
        }
        70% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes pulse-ring {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(184, 134, 11, 0.45);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(184, 134, 11, 0);
        }
      }

      .live-q {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(1.05rem, 3vw, 1.25rem);
        line-height: 1.45;
        margin: 0;
        min-height: 2.8em;
        color: var(--ink);
        text-align: center;
      }

      .live-q[aria-busy="true"] {
        opacity: 0.65;
      }

      .pick-stage {
        text-align: center;
      }

      .pick-row {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: clamp(0.85rem, 4vw, 1.65rem);
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }

      .pick-node {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.45rem;
      }

      .pick-btn {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 4.1rem;
        min-height: 4.1rem;
        border-radius: 14px;
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0.7rem 0.85rem;
        box-shadow: none;
        transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      }

      .pick-btn:hover:not(:disabled) {
        transform: translateY(-2px);
      }

      .pick-btn:active:not(:disabled) {
        transform: scale(0.97);
      }

      .pick-btn:disabled {
        cursor: default;
        opacity: 0.35;
      }

      .pick-btn--chi {
        color: var(--rose-ui);
      }

      .pick-btn--chi:hover:not(:disabled) {
        background: rgba(255, 183, 197, 0.16);
      }

      .pick-btn--zhu {
        color: var(--accent);
      }

      .pick-btn--zhu:hover:not(:disabled) {
        background: rgba(1, 68, 33, 0.08);
      }

      .pick-btn--wan {
        color: #3d5a96;
      }

      .pick-btn--wan:hover:not(:disabled) {
        background: rgba(61, 90, 150, 0.1);
      }

      .pick-btn .pillar-icon {
        width: 2rem;
        height: 2rem;
        display: block;
        pointer-events: none;
      }

      .pick-btn.is-chosen {
        outline: none;
        animation: none;
      }

      .pick-btn--chi.is-chosen {
        background: rgba(255, 183, 197, 0.22);
        box-shadow: inset 0 0 0 2px var(--rose-ui);
      }

      .pick-btn--zhu.is-chosen {
        background: rgba(1, 68, 33, 0.1);
        box-shadow: inset 0 0 0 2px var(--accent);
      }

      .pick-btn--wan.is-chosen {
        background: rgba(61, 90, 150, 0.12);
        box-shadow: inset 0 0 0 2px #3d5a96;
      }

      .rank-pin {
        position: absolute;
        top: -6px;
        right: -4px;
        width: 1.65rem;
        height: 1.65rem;
        border-radius: 50%;
        background: linear-gradient(145deg, #f0d78c, var(--gold));
        color: #3d2e0a;
        font-size: 0.78rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(61, 46, 10, 0.35);
        opacity: 0;
        transform: scale(0);
        pointer-events: none;
      }

      .pick-btn.is-chosen .rank-pin {
        opacity: 1;
        animation: pop-badge 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .pick-label {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
      }

      .form-card__head {
        text-align: center;
      }

      .form-card__head .pick-hint {
        text-align: center;
      }

      .form-card.is-refining .form-card__head {
        display: none;
      }

      .pick-hint {
        margin: 0.5rem 0 0;
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.55;
      }

      /* 拖拽微调 */
      .refine-stage {
        display: none;
      }

      .refine-stage.is-visible {
        display: block;
        text-align: center;
      }

      .refine-kicker {
        margin: 0 0 0.35rem;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.05rem;
        text-align: center;
        color: var(--ink);
      }

      .refine-lede {
        margin: 0 0 1.25rem;
        font-size: 0.86rem;
        color: var(--muted);
        text-align: center;
        line-height: 1.55;
      }

      .ladder {
        position: relative;
        margin: 0 0 1.5rem;
        padding: 0.65rem;
        border-radius: calc(var(--radius) + 2px);
        border: 1px solid var(--line);
        background: #fff;
      }

      .ladder-item {
        position: relative;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.55rem 0.35rem;
        cursor: grab;
        touch-action: none;
        user-select: none;
        border-radius: 12px;
        transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      }

      .ladder-item:active {
        cursor: grabbing;
      }

      .ladder-item.is-dragging {
        opacity: 0.92;
        transform: scale(1.02);
        z-index: 5;
        box-shadow: 0 16px 40px rgba(20, 17, 13, 0.12);
        background: rgba(255, 255, 255, 0.85);
      }

      .ladder-item.is-over {
        background: rgba(1, 68, 33, 0.08);
      }

      .ladder-num {
        flex-shrink: 0;
        width: 1.25rem;
        text-align: center;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--accent);
      }

      .mini-ring {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 1.85rem;
        height: 1.85rem;
        color: inherit;
      }

      .mini-ring .pillar-icon {
        width: 1.65rem;
        height: 1.65rem;
        display: block;
      }

      .mini-ring--chi {
        color: var(--rose-ui);
      }

      .mini-ring--zhu {
        color: var(--accent);
      }

      .mini-ring--wan {
        color: #3d5a96;
      }

      .ladder-text {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--ink);
        text-align: left;
      }

      .grip {
        flex-shrink: 0;
        width: 1.5rem;
        color: var(--muted);
        opacity: 0.65;
        font-size: 1rem;
        letter-spacing: -0.1em;
      }

      .nudge {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        flex-shrink: 0;
      }

      .nudge button {
        width: 1.65rem;
        height: 1.35rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        font-size: 0.72rem;
        cursor: pointer;
        color: var(--accent);
        font-weight: 700;
        line-height: 1;
        padding: 0;
      }

      .nudge button:hover {
        background: var(--accent-soft);
      }

      .nudge button:focus-visible {
        outline: 2px solid var(--accent);
      }

      .refine-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }

      .link-quiet {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
        padding: 0.25rem;
      }

      .link-quiet:hover {
        color: var(--accent);
      }

      .order-preview {
        margin: 0 0 1rem;
        padding: 0.65rem 0.9rem;
        border-radius: 12px;
        background: var(--green-soft);
        font-size: 0.82rem;
        color: var(--ink-soft);
        text-align: center;
        line-height: 1.5;
      }

      .order-preview strong {
        font-family: var(--font-display);
        color: var(--ink);
        font-weight: 700;
      }

      .result-box {
        margin-top: 1rem;
        padding: 0.65rem 0 0.65rem 1rem;
        border-left: 3px solid var(--accent);
        font-size: 0.88rem;
        line-height: 1.55;
        color: var(--ink-soft);
        display: none;
      }

      .result-box[data-visible="true"] {
        display: block;
      }

      .result-box--hold {
        border-left-color: var(--muted);
        color: var(--muted);
      }

      .result-box strong {
        font-family: var(--font-display);
        color: var(--ink);
        display: block;
        margin-bottom: 0.3rem;
      }

      @media (min-width: 560px) {
        .nudge {
          display: none;
        }
      }
    </style>
  </head>
  <body class="page-flow">
    <div class="shell">
      <header class="top-bar">
        <a class="back-link" href="index.html">← 返回</a>
        <div class="brand">
          <svg
            class="brand-icon"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M16 3L5 9.5V17c0 6.5 4.5 12 11 13.5 6.5-1.5 11-7 11-13.5V9.5L16 3z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
            />
            <circle cx="16" cy="15" r="3.2" fill="currentColor" />
            <path
              d="M16 18.5v6"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
          <div>
            <div class="brand-name">锚点</div>
            <div class="brand-tag">行程规划</div>
          </div>
        </div>
        <span class="step-pill">步骤 2 / 3</span>
      </header>

      <section class="step-hero" aria-labelledby="step-title">
        <span class="step-hero__badge" aria-hidden="true">2</span>
        <div class="step-hero__body">
          <span class="step-hero__tag">排个先后顺序</span>
          <h1 class="step-hero__title" id="step-title">玩 · 住 · 吃</h1>
          <p class="step-hero__desc">
            先定一个最想去的，剩下的就让它说了算，剩下的选择都不绕路。
          </p>
        </div>
      </section>

      <section class="form-card" id="form-card" aria-label="优先级设置">
        <div class="form-card__head">
          <h2 id="live-question" class="live-q" aria-live="polite">你最想先顾哪一块？</h2>
          <p class="pick-hint">点一下排第一，再点一下排第二。剩那个不用管，它自己会垫后。</p>
        </div>

      <section class="pick-stage" id="pick-stage" aria-label="点选优先级">
        <div class="pick-row">
          <div class="pick-node">
            <button
              type="button"
              class="pick-btn pick-btn--chi"
              data-pillar="chi"
              aria-label="吃"
            >
              <span class="rank-pin" aria-hidden="true"></span>
              <svg class="pillar-icon" aria-hidden="true"><use href="#icon-chi"></use></svg>
            </button>
            <span class="pick-label">吃</span>
          </div>
          <div class="pick-node">
            <button
              type="button"
              class="pick-btn pick-btn--zhu"
              data-pillar="zhu"
              aria-label="住"
            >
              <span class="rank-pin" aria-hidden="true"></span>
              <svg class="pillar-icon" aria-hidden="true"><use href="#icon-zhu"></use></svg>
            </button>
            <span class="pick-label">住</span>
          </div>
          <div class="pick-node">
            <button
              type="button"
              class="pick-btn pick-btn--wan"
              data-pillar="wan"
              aria-label="玩"
            >
              <span class="rank-pin" aria-hidden="true"></span>
              <svg class="pillar-icon" aria-hidden="true"><use href="#icon-wan"></use></svg>
            </button>
            <span class="pick-label">玩</span>
          </div>
        </div>
      </section>

      <section class="refine-stage" id="refine-stage" aria-label="拖拽微调排序" hidden>
        <p class="refine-kicker">顺序不对？拖一下就行</p>
        <p class="refine-lede">
          排越上面越说了算。电脑拖整行，手机点右侧 <strong>↑ ↓</strong> 也一样。
        </p>
        <p class="order-preview" id="order-preview" aria-live="polite"></p>
        <div class="ladder" id="ladder" role="list"></div>
        <div class="refine-actions">
          <button type="button" class="link-quiet" id="btn-reset-pick">重来一遍</button>
          <button type="button" class="primary" id="btn-submit-order">就这个顺序</button>
        </div>
      </section>

      <div
        class="result-box result-box--ok"
        id="result-ok"
        role="status"
        aria-live="polite"
        data-visible="false"
      >
        <strong>行，就它了</strong>
        顺序是 <strong>玩 → 住 → 吃</strong>，下一关去挑必去景点。
      </div>
      <div
        class="result-box result-box--hold"
        id="result-hold"
        role="status"
        aria-live="polite"
        data-visible="false"
      >
        <strong>这个顺序暂时不认</strong>
        目前只支持「玩 → 住 → 吃」。拖成这顺序，或者点「重来一遍」再选。
      </div>
      </section>
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
      <symbol id="icon-chi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3v18" />
        <path d="M4 3v6" />
        <path d="M6 3v6" />
        <path d="M8 3v6" />
        <path d="M17 3v8" />
        <path d="M15 3h4" />
        <path d="M17 11v10" />
      </symbol>
      <symbol id="icon-zhu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 14v5" />
        <path d="M21 14v5" />
        <path d="M3 14h18" />
        <path d="M3 17h18" />
        <path d="M7 14V9.5" />
        <path d="M17 14V9.5" />
      </symbol>
      <symbol id="icon-wan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21s7-4.5 7-10a7 7 0 1 0-14 0c0 5.5 7 10 7 10z" />
        <circle cx="12" cy="11" r="2" />
      </symbol>
    </svg>

    <script>
      (function () {
        const PILLARS = {
          chi: { label: "吃", className: "chi" },
          zhu: { label: "住", className: "zhu" },
          wan: { label: "玩", className: "wan" },
        };

        const ALL = ["chi", "zhu", "wan"];

        const svgUse = function (id) {
          return (
            '<svg class="pillar-icon" aria-hidden="true"><use href="#icon-' +
            id +
            '"></use></svg>'
          );
        };

        const svgs = { chi: svgUse("chi"), zhu: svgUse("zhu"), wan: svgUse("wan") };

        const elFormCard = document.getElementById("form-card");
        const elQ = document.getElementById("live-question");
        const pickStage = document.getElementById("pick-stage");
        const refineStage = document.getElementById("refine-stage");
        const ladder = document.getElementById("ladder");
        const orderPreview = document.getElementById("order-preview");
        const resultOk = document.getElementById("result-ok");
        const resultHold = document.getElementById("result-hold");

        let rankedPick = [];
        let dragSrc = null;

        function setResults(visible) {
          resultOk.dataset.visible = "false";
          resultHold.dataset.visible = "false";
          if (visible === "ok") resultOk.dataset.visible = "true";
          if (visible === "hold") resultHold.dataset.visible = "true";
        }

        function setQuestion(text) {
          elQ.textContent = text;
        }

        function orderKey(ids) {
          return ids.join("-");
        }

        function updatePreview() {
          const ids = Array.from(ladder.querySelectorAll(".ladder-item")).map(function (n) {
            return n.getAttribute("data-pillar");
          });
          const labels = ids.map(function (id) {
            return PILLARS[id].label;
          });
          orderPreview.innerHTML =
            "现在是：<strong>" + labels.join(" → ") + "</strong>";
        }

        function buildLadderItems(ids) {
          ladder.innerHTML = "";
          ids.forEach(function (id, idx) {
            const p = PILLARS[id];
            const row = document.createElement("div");
            row.className = "ladder-item";
            row.setAttribute("role", "listitem");
            row.setAttribute("data-pillar", id);
            row.setAttribute("draggable", "true");
            row.innerHTML =
              '<span class="ladder-num" aria-hidden="true">' +
              (idx + 1) +
              "</span>" +
              '<span class="mini-ring mini-ring--' +
              p.className +
              '">' +
              svgs[id] +
              "</span>" +
              '<span class="ladder-text">' +
              p.label +
              "</span>" +
              '<span class="grip" aria-hidden="true">⋮⋮</span>' +
              '<div class="nudge">' +
              '<button type="button" class="nudge-up" aria-label="上移">↑</button>' +
              '<button type="button" class="nudge-down" aria-label="下移">↓</button>' +
              "</div>";
            ladder.appendChild(row);
          });
          ladder.querySelectorAll(".ladder-num").forEach(function (n, i) {
            n.textContent = String(i + 1);
          });
          bindLadderEvents();
          updatePreview();
        }

        function bindLadderEvents() {
          ladder.querySelectorAll(".ladder-item").forEach(function (row) {
            row.addEventListener("dragstart", function (e) {
              dragSrc = row;
              row.classList.add("is-dragging");
              try {
                e.dataTransfer.setData("text/plain", row.getAttribute("data-pillar"));
                e.dataTransfer.effectAllowed = "move";
              } catch (err) {}
            });
            row.addEventListener("dragend", function () {
              row.classList.remove("is-dragging");
              ladder.querySelectorAll(".ladder-item").forEach(function (r) {
                r.classList.remove("is-over");
              });
              dragSrc = null;
              renumber();
              updatePreview();
            });
            row.addEventListener("dragover", function (e) {
              e.preventDefault();
              if (!dragSrc || dragSrc === row) return;
              row.classList.add("is-over");
              e.dataTransfer.dropEffect = "move";
            });
            row.addEventListener("dragleave", function () {
              row.classList.remove("is-over");
            });
            row.addEventListener("drop", function (e) {
              e.preventDefault();
              row.classList.remove("is-over");
              if (!dragSrc || dragSrc === row) return;
              const parent = ladder;
              const nodes = Array.from(parent.children);
              const from = nodes.indexOf(dragSrc);
              const to = nodes.indexOf(row);
              if (from < 0 || to < 0) return;
              if (from < to) parent.insertBefore(dragSrc, row.nextSibling);
              else parent.insertBefore(dragSrc, row);
            });
          });

          ladder.querySelectorAll(".nudge-up").forEach(function (btn) {
            btn.addEventListener("click", function () {
              const row = btn.closest(".ladder-item");
              const prev = row && row.previousElementSibling;
              if (prev) ladder.insertBefore(row, prev);
              renumber();
              updatePreview();
            });
          });
          ladder.querySelectorAll(".nudge-down").forEach(function (btn) {
            btn.addEventListener("click", function () {
              const row = btn.closest(".ladder-item");
              const next = row && row.nextElementSibling;
              if (next) ladder.insertBefore(next, row);
              renumber();
              updatePreview();
            });
          });
        }

        function renumber() {
          ladder.querySelectorAll(".ladder-num").forEach(function (n, i) {
            n.textContent = String(i + 1);
          });
        }

        function showRefine(orderIds) {
          pickStage.hidden = true;
          refineStage.hidden = false;
          refineStage.classList.add("is-visible");
          elFormCard.classList.add("is-refining");
          buildLadderItems(orderIds);
          setResults(false);
        }

        function resetAll() {
          rankedPick = [];
          refineStage.classList.remove("is-visible");
          refineStage.hidden = true;
          elFormCard.classList.remove("is-refining");
          pickStage.hidden = false;
          ladder.innerHTML = "";
          orderPreview.textContent = "";
          document.querySelectorAll(".pick-btn").forEach(function (b) {
            b.disabled = false;
            b.classList.remove("is-chosen");
            const pin = b.querySelector(".rank-pin");
            if (pin) pin.textContent = "";
          });
          setQuestion("你最想先顾哪一块？");
          setResults(false);
        }

        document.querySelectorAll(".pick-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            if (btn.disabled) return;
            const id = btn.getAttribute("data-pillar");
            if (rankedPick.includes(id)) return;

            rankedPick.push(id);
            btn.classList.add("is-chosen");
            const pin = btn.querySelector(".rank-pin");
            pin.textContent = String(rankedPick.length);

            if (rankedPick.length === 1) {
              setQuestion("第二呢，剩下两个里选哪个？");
            } else if (rankedPick.length === 2) {
              document.querySelectorAll(".pick-btn").forEach(function (b) {
                b.disabled = true;
              });
              const last = ALL.filter(function (x) {
                return rankedPick.indexOf(x) < 0;
              })[0];
              rankedPick.push(last);
              window.setTimeout(function () {
                const b3 = document.querySelector('.pick-btn[data-pillar="' + last + '"]');
                if (b3) {
                  b3.classList.add("is-chosen");
                  b3.disabled = true;
                  const p3 = b3.querySelector(".rank-pin");
                  if (p3) p3.textContent = "3";
                }
                showRefine(rankedPick.slice());
              }, 380);
            }
          });
        });

        document.getElementById("btn-reset-pick").addEventListener("click", function () {
          resetAll();
        });

        document.getElementById("btn-submit-order").addEventListener("click", function () {
          const ids = Array.from(ladder.querySelectorAll(".ladder-item")).map(function (n) {
            return n.getAttribute("data-pillar");
          });
          const key = orderKey(ids);
          console.log("[P2] submit order", { key, ids });
          if (key === "wan-zhu-chi") {
            setResults("ok");
            try {
              sessionStorage.setItem(
                "anchorPriority",
                JSON.stringify({ order: ids, key: key, ok: true })
              );
            } catch (e) {}
            window.location.href = "p3.html";
          } else {
            setResults("hold");
            try {
              sessionStorage.removeItem("anchorPriority");
            } catch (e) {}
          }
        });
      })();
    </script>
  </body>
</html>

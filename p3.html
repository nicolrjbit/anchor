        color: var(--ink);

        line-height: 1.5;

        margin-bottom: 0.45rem;

        function normalizeCity(name) {
          if (!name) return "";
          var s = String(name).trim();
          if (s.length > 1 && s.charAt(s.length - 1) === "市") s = s.slice(0, -1);
          return s;
        }

        function loadTrip() {
          try {
            var raw = sessionStorage.getItem("anchorTrip");
            if (raw) return JSON.parse(raw);
          } catch (e) {}
          return { days: 3, destination: "北京", departure: "" };
        }

        function getAttractionsForCityKey(cityKey) {
          if (cityKey && MOCK[cityKey]) return MOCK[cityKey];
          return [];
        }

        function distKm(a, b) {
          var R = 6371;
          function toRad(d) {
            return (d * Math.PI) / 180;
          }
          var dLat = toRad(b.lat - a.lat);
          var dLng = toRad(b.lng - a.lng);
          var la1 = toRad(a.lat);
          var la2 = toRad(b.lat);
          var h =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
          return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
        }

        function tspOpenPath(points) {
          var n = points.length;
          if (n === 0) return { ordered: [], km: 0 };
          if (n === 1) return { ordered: [points[0]], km: 0 };
          var idx = [];
          for (var i = 0; i < n; i++) idx.push(i);

          function permutations(arr) {
            if (arr.length <= 1) return [arr.slice()];
            var out = [];
            for (var i = 0; i < arr.length; i++) {
              var rest = arr.slice(0, i).concat(arr.slice(i + 1));
              var sub = permutations(rest);
              for (var j = 0; j < sub.length; j++) {
                out.push([arr[i]].concat(sub[j]));
              }
            }
            return out;
          }

          var perms = permutations(idx);
          var bestOrder = null;
          var bestD = Infinity;
          for (var p = 0; p < perms.length; p++) {
            var perm = perms[p];
            var len = 0;
            for (var k = 0; k < n - 1; k++) {
              len += distKm(points[perm[k]], points[perm[k + 1]]);
            }
            if (len < bestD) {
              bestD = len;
              bestOrder = perm;
            }
          }
          var ordered = [];
          for (var t = 0; t < bestOrder.length; t++) {
            ordered.push(points[bestOrder[t]]);
          }
          return { ordered: ordered, km: bestD };
        }

          if (s === "低") return "tag--stamina-l";

            chk.addEventListener("change", onCheckChange);
            var body = document.createElement("div");
            body.className = "attr-body";
            body.innerHTML =
              '<p class="attr-name"></p>' +
              '<p class="attr-desc"></p>' +
              '<div class="attr-meta-row">' + '<span class="rec-stars"></span>' + "</div>" +
              '<div class="tags"></div>';
            body.querySelector(".attr-name").textContent = a.name;
            body.querySelector(".attr-desc").textContent = a.desc;
            body.querySelector(".rec-stars").textContent =
              "推荐度 " + a.recommend + " / 5（演示聚合）";
            var tags = body.querySelector(".tags");
            var t1 = document.createElement("span");
            t1.className = "tag " + staminaClass(a.stamina);
            t1.textContent = "体力消耗：" + a.stamina;
            var t2 = document.createElement("span");
            t2.className = "tag tag--time";
            t2.textContent = "建议游玩：" + a.duration;
            tags.appendChild(t1);
            tags.appendChild(t2);
            card.appendChild(chk);
            card.appendChild(body);
            listEl.appendChild(card);
          });
          syncDisabled();
        }

        function getCheckedIds() {
          var ids = [];
          listEl.querySelectorAll('input[type="checkbox"]:checked').forEach(function (c) {
            ids.push(c.value);
          });
          return ids;
        }

        function syncDisabled() {
          var n = getCheckedIds().length;
          listEl.querySelectorAll(".attr-card").forEach(function (card) {
            var id = card.getAttribute("data-id");
            var input = card.querySelector('input[type="checkbox"]');
            var checked = input.checked;
            if (!checked && n >= maxPick) {
              card.classList.add("is-disabled");
              input.disabled = true;
            } else {
              card.classList.remove("is-disabled");
              input.disabled = false;
            }
          });
        }

        function onCheckChange() {
          selectedIds = getCheckedIds();
          var n = selectedIds.length;
          document.getElementById("select-hint").textContent =
            "已选 " + n + " / " + maxPick + " 个 · 地图已按 TSP 近似路径连接";
          btnConfirm.disabled = n < 1;
          updateMap();
          syncDisabled();
        }

        function clearMapOverlays() {
          if (!map) return;
          markers.forEach(function (m) {
            map.remove(m);
          });
          markers = [];
          if (polyline) {
            map.remove(polyline);
            polyline = null;
          }
        }

        function updateMap() {
          var pts = selectedIds.map(function (id) {
            return idToAttr[id];
          }).filter(Boolean);

          if (!map || typeof AMap === "undefined") {
            if (pts.length === 0) {
              pathSummary.textContent = "未选择景点";
              pathKm.textContent = "";
            } else {
              var r0 = tspOpenPath(pts);
              pathSummary.textContent =
                "顺序：" + r0.ordered.map(function (p, i) {
                  return String.fromCharCode(65 + i) + "." + p.name;
                }).join(" → ");
              pathKm.textContent = "约 " + r0.km.toFixed(1) + " km（直线球面）";
            }
            if (typeof AMap === "undefined") {
              fallbackEl.dataset.visible = "true";
              mapEl.style.display = "none";
            }
            return;
          }

          fallbackEl.dataset.visible = "false";
          mapEl.style.display = "";
          clearMapOverlays();

          if (pts.length === 0) {
            pathSummary.textContent = "未选择景点";
            pathKm.textContent = "";
            centerMapToDestination();
            return;
          }

          var tsp = tspOpenPath(pts);
          var ordered = tsp.ordered;
          var path = ordered.map(function (p) {
            return [p.lng, p.lat];
          });

          for (var i = 0; i < ordered.length; i++) {
            var p = ordered[i];
            var mk = new AMap.Marker({
              position: [p.lng, p.lat],
              map: map,
              label: {
                content:
                  '<span style="border:1px solid rgb(1,68,33);color:rgb(1,68,33);font-weight:700;padding:2px 6px;border-radius:8px;background:rgba(255,252,253,.95)">' +
                  String.fromCharCode(65 + i) +
                  "</span>",
                direction: "right",
                offset: new AMap.Pixel(8, -8),
              },
            });
            markers.push(mk);
          }

          if (path.length >= 2) {
            polyline = new AMap.Polyline({
              path: path,
              strokeColor: "rgb(1, 68, 33)",
              strokeWeight: 3,
              strokeOpacity: 0.78,
              strokeStyle: "dashed",
              map: map,
            });
          }

          map.setFitView(markers.concat(polyline ? [polyline] : []), false, [48, 48, 48, 48]);

          pathSummary.textContent =
            "游览顺序：" + ordered.map(function (p, i) {
              return String.fromCharCode(65 + i) + "." + p.name;
            }).join(" → ");
          pathKm.textContent = "约 " + tsp.km.toFixed(1) + " km（球面直线，非驾车导航距离）";
        }

        function centerMapToDestination() {
          if (!map || typeof AMap === "undefined") return;
          var raw = (trip.destination || "").trim() || "北京";
          var key = normalizeCity(raw);
          if (CITY_CENTERS[key]) {
            var c = CITY_CENTERS[key];
            map.setZoomAndCenter(12, [c.lng, c.lat]);
            return;
          }
          if (attractions.length) {
            var a0 = attractions[0];
            map.setZoomAndCenter(12, [a0.lng, a0.lat]);
            return;
          }
          if (typeof AMap.Geocoder !== "function") {
            map.setZoomAndCenter(11, [116.397428, 39.91823]);
            return;
          }
          var geocoder = new AMap.Geocoder({ city: "全国" });
          geocoder.getLocation(raw, function (status, result) {
            if (!map) return;
            if (status === "complete" && result.geocodes && result.geocodes[0]) {
              var loc = result.geocodes[0].location;
              map.setZoomAndCenter(12, [loc.lng, loc.lat]);
            } else {
              map.setZoomAndCenter(11, [116.397428, 39.91823]);
            }
          });
        }

        function initMap() {
          if (typeof AMap === "undefined") {
            fallbackEl.dataset.visible = "true";
            mapEl.style.display = "none";
            return;
          }
          map = new AMap.Map("amap-map", {
            zoom: 12,
            viewMode: "2D",
          });
          centerMapToDestination();
        }

        function bootP3() {
          renderList();
          if (!window.AmapApp || !AmapApp.isConfigured()) {
            fallbackEl.dataset.visible = "true";
            mapEl.style.display = "none";
            document.getElementById("map-city-label").textContent +=
              "（请配置 amap-config.js 以启用地图）";
            return;
          }
          AmapApp.loadAmap(["AMap.Geocoder"])
            .then(function () {
              initMap();
              updateMap();
            })
            .catch(function () {
              fallbackEl.dataset.visible = "true";
              mapEl.style.display = "none";
            });
        }

        bootP3();

        btnConfirm.addEventListener("click", function () {
          var ids = getCheckedIds();
          console.log("[P3] 必去景点（演示）", { ids: ids, trip: trip });
          alert("演示：已记录 " + ids.length + " 个景点（详见控制台）。");
        });
      })();
    </script>
  </body>
</html>
